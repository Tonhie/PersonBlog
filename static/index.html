<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Tonhie's Blog</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 700px; margin: 40px auto; line-height: 1.6; }
        .post-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 12px; }
        .author { color: #666; font-size: 0.9em; }
        /* 让表单容器与文章卡片风格一致 */
        .form-section {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }

        /* 使输入行内的两个输入框并排且等宽 */
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row input {
            flex: 1;  /* 两个输入框各占一半宽度 */
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
        }

        /* 单独设置文本域样式 */
        #content {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            margin-bottom: 15px;
            box-sizing: border-box;
            resize: vertical; /* 允许垂直调整大小 */
        }

        /* 提交按钮样式 */
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
    
</head>
<body>
    <h1>Tonhie's Blog</h1>
    <div id="post-container">加载中...</div>
    <script>
        const API_URL = "";
        // 当页面加载完成时执行
        async function fetchPosts() {
            try {
                // 1. 调用你写的 FastAPI 接口
                const response = await fetch(`${API_URL}/posts`);
                const result = await response.json();
                
                const container = document.getElementById('post-container');
                container.innerHTML = ''; // 清空加载提示

                // 2. 遍历数据并生成 HTML
                result.data.forEach(post => {
                    const postHtml = `
                        <div class="post-card">
                            <h2>${post.title}</h2>
                            <p class="author">Author: ${post.author}</p>
                            <p>${post.content}</p>
                        </div>
                    `;
                    container.innerHTML += postHtml;
                });
            } catch (error) {
                console.error('获取文章失败:', error);
                document.getElementById('post-container').innerText = '无法连接到后端服务器';
            }
        }

        fetchPosts();
    </script>
    <div class="form-section">
        <h3>Post New Blog</h3>
        <div class="form-row">
            <input type="text" id="author" placeholder="Author Name">
            <input type="text" id="title" placeholder="Post Title">
        </div>
        <textarea id="content" placeholder="Post Content" rows="4"></textarea>
        <button onclick="submitPost()">Submit Post</button>
    </div>
    <script>
        async function submitPost() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;

            try {
                const response = await fetch(`${API_URL}/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author, title, content })
                });
                const result = await response.json();
                if (response.ok) {
                    alert('Post submitted successfully!');
                    fetchPosts(); // 刷新文章列表
                } else {
                    alert('Failed to submit post: ' + result.detail);
                }
            } catch (error) {
                console.error('提交文章失败:', error);
                alert('Unable to connect to the server');
            }
        }
    </script>
</body>
</html>
