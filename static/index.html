<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonhie.log</title>
    <!-- Markdown & Formula & Code highlight -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <style>
        /* =================全局参数配置================= */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sub-text-color: #666666;
            --line-color: #000000;
            --max-width: 700px;
            --font-main: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'SimSun', sans-serif;
            --font-mono: 'Courier New', Courier, 'SimSun', monospace;
            --modal-bg: rgba(240, 240, 240, 0.92);
            --shadow-color: rgba(0,0,0,0.15);
            --dash-color: rgba(0,0,0,0.1);
            --code-bg: rgba(0,0,0,0.05);

            /* 日志等级颜色 (低饱和度) */
            --color-info: #2e7d32; /* green */
            --color-warn: #c49000; /* yellow */
            --color-error: #c62828; /* red */
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #ffffff;
            --sub-text-color: #999999;
            --line-color: #ffffff;
            --modal-bg: rgba(15, 15, 15, 0.92);
            --shadow-color: rgba(0,0,0,0.8);
            --dash-color: rgba(255,255,255,0.2);
            --code-bg: rgba(255,255,255,0.1);

            --color-info: #4caf50;
            --color-warn: #ffca28;
            --color-error: #ef5350;
        }

        /* 极简终端风格 */
        body { 
            font-family: var(--font-main); 
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: var(--max-width); 
            margin: 50px auto; 
            line-height: 1.7; 
            padding: 0 20px;
            overflow-x: hidden;
        }

        /* =================标题特效================= */
        .header-section {
            margin-bottom: 40px;
            border-bottom: 2px solid var(--line-color);
            padding-bottom: 20px;
        }
        .subtitle {
            font-family: var(--font-mono);
            color: var(--sub-text-color);
            font-size: 0.9em;
            min-height: 24px;
            display: flex;
            align-items: center;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--sub-text-color);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        h1 {
            font-size: 2.5em;
            margin: 5px 0 0 0;
            font-weight: 800;
            letter-spacing: -1px;
            cursor: pointer;
            transition: transform 0.1s, text-shadow 0.1s;
            display: inline-block; /* 1. 只悬浮在字上 */
        }
        h1:hover {
            transform: translateY(-2px);
            text-shadow: 2px 2px 0px var(--sub-text-color);
        }
        h1:active {
            transform: translateY(0);
        }

        /* =================动态打字占位================= */
        .loading-text {
            font-family: var(--font-mono);
            font-weight: bold;
        }

        /* =================CMD 特效================= */
        .journal-cmd-line {
            font-family: var(--font-mono);
            font-size: 1.1em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            color: var(--text-color);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 50px;
            overflow: hidden;
        }
        .journal-cmd-line.executed {
            opacity: 0;
            transform: translateY(-10px);
            max-height: 0;
            margin-bottom: 0;
        }
        .bash-prefix {
            font-family: var(--font-mono);
            font-weight: bold;
            margin-right: 8px;
        }

        /* ===== IP 展开特效 ===== */
        .ip-box.tr { cursor: pointer; transition: color 0.2s; border-bottom: 1px dashed transparent; }
        .ip-box.tr:hover { border-bottom: 1px dashed var(--sub-text-color); }
        .ip-part { display: inline-block; vertical-align: bottom; }
        .ip-part.hidden-mid {
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        .ip-part.dots {
            max-width: 20px;
            overflow: hidden;
            transition: max-width 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
        }
        .ip-box.expanded .hidden-mid { max-width: 300px; opacity: 1; }
        .ip-box.expanded .dots { max-width: 0; opacity: 0; }

        .journal-cmd-text {
            display: inline-block;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            transition: width 1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .modal-divider {
            border-bottom: 2px dashed var(--line-color);
            margin: 25px 0 35px 0;
            position: relative;
            opacity: 1;
            text-align: center;
        }
        .modal-divider::after {
            content: "[ LOG ENTRY BEGIN ]";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 0 15px;
            font-family: var(--font-mono);
            font-size: 0.85em;
            color: var(--line-color);
            font-weight: bold;
            white-space: nowrap;
        }

        /* =================文章卡片================= */
        .post-card { 
            border: 1px solid var(--line-color); 
            padding: 20px; 
            margin-bottom: 20px; 
            background-color: var(--bg-color);
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
        .post-card:hover { /* 2. 卡片和按钮通用高级悬浮 */
            transform: translate(-3px, -3px);
            box-shadow: 4px 4px 0px var(--line-color);
        }
        
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .post-level {
            font-family: var(--font-mono);
            font-size: 0.85em;
            font-weight: bold;
            padding: 2px 6px;
            border: 1px solid currentColor;
        }
        .level-INFO { color: var(--color-info); }
        .level-WARN { color: var(--color-warn); }
        .level-ERROR { 
            color: var(--color-error); 
            animation: error-pulse 1.5s infinite;
        }

        @keyframes error-pulse {
            0% { box-shadow: 0 0 0 0 rgba(198, 40, 40, 0.4); }
            70% { box-shadow: 0 0 0 5px rgba(198, 40, 40, 0); }
            100% { box-shadow: 0 0 0 0 rgba(198, 40, 40, 0); }
        }

        .post-card h2 { margin: 0; font-size: 1.4em; }
        
        .post-meta { 
            font-family: var(--font-mono);
            color: var(--sub-text-color); 
            font-size: 0.85em; 
            margin-bottom: 10px;
        }

        .truncate-text {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 0;
        }

        /* =================模态窗口 (全屏阅读层) ================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--modal-bg);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 模态内容区 */
        .modal-wrapper {
            display: flex;
            width: 100%;
            max-width: 800px;
            height: 90vh;
            transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            filter: drop-shadow(0 15px 30px var(--shadow-color));
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* 阅读主面板 */
        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--line-color);
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), flex 0.4s;
            transform: scale(0.95) translateY(40px);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }
        
        /* 注入面板开启后，窗口变宽 */
        .modal-overlay.active.injected .modal-wrapper {
            max-width: 1200px;
        }

        /* 评论区 (INJECT) */
        .modal-comments {
            background: var(--bg-color);
            border: 1px solid var(--line-color);
            border-left: none;
            width: 0;
            overflow: hidden;
            padding: 0;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            transform: scale(0.95) translateY(40px);
        }
        .modal-overlay.active.injected .modal-comments {
            width: 480px;
            padding: 40px 20px;
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* 模态控制按钮 */
        .modal-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        button.t-btn {
            background: var(--bg-color);
            border: 1px solid var(--line-color);
            color: var(--text-color);
            font-size: 1em;
            font-family: var(--font-mono);
            cursor: pointer;
            padding: 5px 15px;
            transition: all 0.2s ease-in-out;
            font-weight: bold;
        }
        button.t-btn:hover {
            transform: translate(-3px, -3px);
            box-shadow: 4px 4px 0px var(--line-color);
        }
        button.t-btn:active {
            transform: translate(0px, 0px);
            box-shadow: 0px 0px 0px var(--line-color);
            background-color: var(--code-bg);
        }

        #modal-body { 
            white-space: pre-wrap; 
            margin-top: 30px;
            font-family: var(--font-main);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* 评论区样式 */
        .comments-header {
            font-family: var(--font-mono);
            font-weight: bold;
            border-bottom: 2px solid var(--line-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .comment-display {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            font-family: var(--font-mono);
            font-size: 0.85em; /* 稍微缩小一点日志尺寸 */
            color: var(--sub-text-color);
        }
        .comment-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--dash-color);
            opacity: 0;
            transform: translateY(10px);
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .comment-meta {
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        /* 打分组件 */
        .rating-wrapper {
            font-family: var(--font-mono);
            font-size: 1.05em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            overflow: hidden;
            max-height: 40px; 
            margin-bottom: 15px;
            opacity: 1;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1), margin 0.4s ease, opacity 0.3s ease;
        }
        .rating-left {
            display: flex;
            align-items: center;
        }
        .desktop-submit-btn {
            font-size: 0.85em;
            padding: 4px 12px;
            background: var(--bg-color);
            border: 1px solid var(--line-color);
            color: var(--text-color);
            cursor: pointer;
            font-family: var(--font-mono);
            transition: all 0.2s;
        }
        .desktop-submit-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
        .mobile-submit-btn {
            display: none; /* hidden on desktop */
            font-size: 1.25em;
            padding: 0 15px;
            background: var(--bg-color);
            border: 1px solid var(--line-color);
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
        }

        .rating-wrapper .r-cell {
            cursor: pointer;
            display: inline-block;
            width: 15px;
            padding: 0 4px;
            text-align: center;
            user-select: none;
            transition: color 0.1s, transform 0.1s;
        }
        .rating-wrapper .r-cell:hover {
            color: var(--sub-text-color);
            transform: scale(1.2);
        }

        /* 修复后的对齐光标及输入区 (通用折叠逻辑) */
        .terminal-input-wrapper {
            position: relative;
            display: flex;
            align-items: stretch; /* 让按钮和输入框高度强制对齐 */
            gap: 10px;
            width: 100%;
        }

        .input-container {
            position: relative;
            flex: 1;
            display: flex; /* 内部也使用 flex 确保 input 充满 */
        }

        /* 默认隐藏评分，使用动画过渡 */
        .modal-comments:not(.input-expanded) .rating-wrapper {
            max-height: 0;
            margin-bottom: 0;
            opacity: 0;
            pointer-events: none;
        }

        /* 原生输入框，用于接收键盘输入，但为了与overlay彻底对齐，需使得文字完全隐形但维持宽高占位 */
        #comment-input {
            width: 100%;
            height: 44px;
            border: 1px solid var(--line-color);
            background: var(--bg-color);
            padding: 10px;
            box-sizing: border-box;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            caret-color: transparent; 
            color: transparent; /* 完全隐藏原生文字，防止出现叠加错位 */
            cursor: text;
            overflow-y: hidden; /* Hide scrollbar for exact overlay matching */
            transition: height 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 未展开时的输入框单行高度 */
        .modal-comments:not(.input-expanded) #comment-input {
            height: 44px !important;
            min-height: 44px;
            white-space: nowrap;
            overflow: hidden;
        }

        /* 未展开时显示明显的占位符提示 */
        .modal-comments:not(.input-expanded) #comment-input::placeholder {
            color: var(--text-color);
            opacity: 0.8;
        }

        /* 展开后隐藏占位符以显示闪烁光标和输入内容 */
        .modal-comments.input-expanded #comment-input::placeholder {
            color: transparent;
        }

        #comment-input:focus {
            box-shadow: inset 2px 2px 0px var(--dash-color);
            cursor: text;
        }

        /* 覆盖层负责显示文字和方块光标，保持内边距和字体与 textarea 绝对一致 */
        .terminal-input-overlay {
            position: absolute;
            top: 1px; left: 1px; right: 1px; bottom: 1px; /* 留出border位置 */
            padding: 10px; /* 必须跟textarea一致 */
            box-sizing: border-box;
            pointer-events: none;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: hidden;
            color: var(--text-color);
            height: 44px;
            transition: height 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 未展开时的覆盖层高度一致 */
        .modal-comments:not(.input-expanded) .terminal-input-overlay {
            height: 44px !important;
            white-space: nowrap;
        }

        /* 未展开时不显示光标，防止喧宾夺主 */
        .modal-comments:not(.input-expanded) .terminal-input-overlay span.cursor-block {
            display: none;
        }

        .terminal-input-overlay span.cursor-block {
            display: inline-block;
            width: 8px;
            height: 1.2em; /* Ensure cursor block is aligned correctly with Chinese characters */
            background-color: var(--line-color);
            animation: blink 1s step-end infinite;
            vertical-align: middle; /* Align middle with text */
            position: relative;
            top: -1px; /* Slight adjustment */
        }

        /* ===============Markdown================ */
        .markdown-body { font-family: var(--font-main); line-height: 1.7; font-size: 1.05em; }
        .markdown-body code { font-family: var(--font-mono); background: var(--code-bg); padding: 2px 4px; border: 1px solid var(--line-color); }
        .markdown-body pre { background: var(--text-color) !important; color: var(--bg-color) !important; padding: 15px; border: 1px solid var(--line-color); overflow-x: auto; border-radius: 2px; }
        .markdown-body pre code { background: transparent; border: none; padding: 0; color: inherit; }
        .markdown-body blockquote { margin: 0 0 10px 0; padding-left: 15px; border-left: 4px solid var(--line-color); color: var(--sub-text-color); font-family: var(--font-mono); }
        .markdown-body a { color: var(--text-color); font-weight: bold; text-decoration: underline; }
        .markdown-body img { max-width: 100%; border: 1px solid var(--line-color); display: block; margin: 10px 0; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-family: var(--font-mono); border-bottom: 2px dashed var(--line-color); padding-bottom: 5px; margin-top: 30px; letter-spacing: -0.5px;}
        .markdown-body p { margin-bottom: 1em; }

        /* ================= 用户设置面板 ================= */
        .env-configs {
            margin-top: 30px;
            font-family: var(--font-mono);
        }
        .env-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .env-name {
            color: var(--color-warn);
            margin-right: 8px;
        }
        .env-value-interactive {
            background: rgba(0,0,0,0.02);
            border: none;
            border-bottom: 1px dashed var(--line-color);
            color: var(--color-info);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 150px;
            margin-left: 4px;
            padding: 2px 5px;
            transition: all 0.2s;
        }
        [data-theme="dark"] .env-value-interactive {
            background: rgba(255,255,255,0.05);
        }
        .env-value-interactive:focus {
            border-bottom: 1px solid var(--line-color);
            background: var(--code-bg);
        }
        .env-toggle {
            cursor: pointer;
            color: var(--color-info);
            background: var(--code-bg);
            padding: 2px 8px;
            border-radius: 2px;
            border: 1px dashed transparent;
            transition: all 0.2s;
        }
        .env-toggle:hover {
            border: 1px dashed var(--color-info);
        }

        /* ================= 移动端特别适配 ================= */
        body.mobile-mode {
            margin: 20px auto;
            padding: 0 15px;
            max-width: 100%;
        }
        .mobile-mode h1 { font-size: 1.8em; }
        .mobile-mode .post-card { padding: 15px; }
        .mobile-mode .journal-cmd-line { flex-wrap: wrap; font-size: 0.9em; }
        .mobile-mode .bash-prefix { display: block; margin-bottom: 4px; width: 100%; }
        
        .mobile-mode .modal-overlay { 
            align-items: stretch;
            transition: opacity 0.3s ease, visibility 0.3s ease, height 0.3s cubic-bezier(0.16, 1, 0.3, 1), top 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .mobile-mode .modal-wrapper {
            height: 100%;
            max-width: 100vw;
            flex-direction: column;
            filter: none;
            box-shadow: none;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        .mobile-mode .modal-content {
            padding: 20px;
            border: none;
            flex: 1;
            box-sizing: border-box;
            transform: scale(1) translateY(100px);
        }
        .mobile-mode .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }
        .mobile-mode.modal-overlay.active.injected .modal-wrapper,
        .mobile-mode .modal-overlay.active.injected .modal-wrapper {
            max-width: 100vw;
        }
        .mobile-mode .modal-comments {
            position: absolute;
            left: 0;
            width: 100%;
            max-width: 100vw;
            top: 75px; /* 让高度直接顶到文章标题的上方 */
            height: auto;
            bottom: 0;
            border-left: none;
            border-right: none;
            border-bottom: none;
            border-top: 2px dashed var(--line-color);
            background: var(--bg-color);
            padding: 20px 15px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
        }
        .mobile-mode .modal-overlay.active.injected .modal-comments {
            transform: translateY(0);
        }
        .mobile-mode .modal-controls { 
            position: sticky; 
            top: 0; 
            right: 0; 
            margin-top: -5px;
            padding-top: 5px;
            padding-bottom: 10px;
            margin-bottom: 10px; 
            justify-content: space-between; 
            z-index: 60; 
            background: var(--bg-color);
        }

        /* Mobile specific comments overrides */
        .mobile-mode .desktop-submit-btn { display: none !important; }
        .mobile-mode .modal-comments.input-expanded .mobile-submit-btn { display: flex; }
        .mobile-mode .mobile-submit-btn {
            display: flex; /* 默认随折叠态也可以隐藏，只需在flex布局中起作用 */
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .mobile-mode .modal-comments:not(.input-expanded) .mobile-submit-btn {
            display: none;
        }

        /* 统一输入框和按钮的基础高度和盒模型 */
        .mobile-mode #comment-input,
        .mobile-mode .mobile-submit-btn {
            height: 44px;
            box-sizing: border-box;
            margin: 0;
            vertical-align: middle;
        }

        .mobile-mode #comment-input,
        .mobile-mode .terminal-input-overlay {
            font-size: 16px; /* 阻止iOS点击输入框时自动放大 */
        }
        
        .mobile-mode .rating-wrapper {
            font-size: 0.95em; /* 进一步缩小整个评分栏字体以防换行 */
        }
        .mobile-mode .rating-wrapper .r-cell {
            width: 16px; 
            height: 16px;
            padding: 0; /* 移除左右间距 */
            font-size: 0.9em;
            line-height: 16px;
        }
        
        @media (max-width: 768px) {
            /* Fallback basic media queries inline with mobile-mode class */
            body { margin: 20px auto; padding: 0 15px; max-width: 100%; }
            .modal-overlay { align-items: stretch; }
            .modal-wrapper { height: 100%; max-width: 100%; flex-direction: column; filter: none; box-sizing: border-box; }
            .modal-content { padding: 20px; border: none; flex: 1; box-sizing: border-box; }
            .modal-comments { box-sizing: border-box; width: 100%; max-width: 100%; }
            .modal-overlay.active.injected .modal-comments {
                width: 100%; /*height: 50vh;*/ border-left: none; border-top: 2px dashed var(--line-color); padding: 20px 15px; box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="subtitle">
            <span id="subtitle-text"></span><span class="cursor" style="height:12px;"></span>
        </div>
        <h1 onclick="openSiteInfo()">>> Tonhie.log</h1>
    </div>

    <div id="cmd-container">
        <div class="journal-cmd-line" id="cmd-line-wrapper">
            <span class="bash-prefix" id="main-bash-prefix"></span>
            <span class="journal-cmd-text" id="journal-cmd"></span>
        </div>
    </div>
    <div id="post-container"></div>

    <!-- 阅读与评论 Modal -->
    <div class="modal-overlay" id="read-modal">
        <div class="modal-wrapper">
            <div class="modal-content">
                <div class="modal-controls">
                    <button class="t-btn" id="inject-btn" onclick="toggleInject()">[ FORK ]</button>
                    <button class="t-btn" onclick="closeModal()">[ FLUSH ]</button>
                </div>
                <div class="post-header" id="modal-header-box">
                    <span class="post-level" id="modal-level"></span>
                    <h1 id="modal-title" style="font-size: 2em; margin-bottom: 0; cursor: default;"></h1>
                </div>
                <div class="post-meta" id="modal-meta"></div>
                <div class="modal-divider"></div>
                <div id="modal-body"></div>
            </div>

            <div class="modal-comments" id="modal-comments-sec">
                <div class="comments-header" id="comments-header">> SYSLOG / Subprocess Injections</div>
                <div class="comment-display" id="comment-list">
                    > No injections detected.
                </div>
                
                <div id="comment-input-section">
                    <!-- 打分组件 -->
                    <div class="rating-wrapper">
                        <div class="rating-left">
                            <span>> METRIC: [</span>
                            <span id="rate-stars">
                                <span class="r-cell" onclick="setRating(1)">■</span>
                                <span class="r-cell" onclick="setRating(2)">■</span>
                                <span class="r-cell" onclick="setRating(3)">■</span>
                                <span class="r-cell" onclick="setRating(4)">■</span>
                                <span class="r-cell" onclick="setRating(5)">■</span>
                            </span>
                            <span>] <span id="rate-text">5</span>/5</span>
                        </div>
                        <button class="t-btn desktop-submit-btn" onclick="submitComment()">[ JOIN ]</button>
                    </div>
                    
                    <div class="comment-input-area terminal-input-wrapper">
                        <div class="input-container">
                            <textarea id="comment-input" placeholder="> [ INPUT STDIN ]" oninput="updateCursorOverlay()"></textarea>
                            <div class="terminal-input-overlay" id="input-overlay"><span class="cursor-block"></span></div>
                        </div>
                        <button class="t-btn mobile-submit-btn" onclick="submitComment()">[ JOIN ]</button>
                    </div>
                </div>

                <!-- Sys config 用 -->
                <style>
                    .sys-always-show { opacity: 1 !important; max-height: 40px !important; margin-bottom: 15px !important; pointer-events: auto !important; overflow: visible !important; }
                    .sys-mobile-btn { display: none; font-size: 1.25em; padding: 0 15px; background: var(--bg-color); border: 1px solid var(--line-color); color: var(--text-color); cursor: pointer; height: 44px; box-sizing: border-box; }
                    .mobile-mode .sys-mobile-btn { display: flex; align-items: center; justify-content: center; }
                    .mobile-mode .sys-desktop-btn { display: none !important; }
                    .sys-env-scroll-area { 
                        display: flex; align-items: center; overflow-x: auto; gap: 8px; 
                        scrollbar-width: none; -ms-overflow-style: none; transition: transform 0.3s; flex: 1; margin: 0 4px;
                        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 3.33%, black 96.67%, transparent 100%);
                        mask-image: linear-gradient(to right, transparent 0%, black 3.33%, black 96.67%, transparent 100%);
                    }
                    .sys-env-scroll-area::-webkit-scrollbar { display: none; }
                    .custom-select-options {
                        position: absolute; left: 0; bottom: calc(100% - 1px); width: 100%; box-sizing: border-box;
                        background: var(--bg-color) !important; border: 1px solid var(--line-color);
                        border-bottom: none; 
                        transform: translateY(20px); opacity: 0; visibility: hidden;
                        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, visibility 0.3s;
                        z-index: 99999; box-shadow: 0 -10px 20px var(--shadow-color);
                        display: block; /* ensure block explicitly */
                    }
                    .custom-select-options.open { transform: translateY(0); opacity: 1; visibility: visible; }
                    .custom-select-opt { 
                        padding: 10px; cursor: pointer; border-bottom: 1px dashed var(--line-color); 
                        font-family: var(--font-mono); font-size: 14px; transition: all 0.2s; 
                        color: var(--text-color); background: var(--bg-color); z-index: 10000; position: relative;
                        display: block; width: 100%; box-sizing: border-box; /* fill the whole space */
                    }
                    .custom-select-opt:hover { background: var(--text-color); color: var(--bg-color); padding-left: 15px; }
                </style>
                <div id="sys-input-section" style="display: none; flex-direction: column;">
                    <div class="rating-wrapper sys-always-show" style="display: flex; gap: 10px; overflow: hidden; max-height: 40px;">
                        <div class="rating-left" style="display: flex; align-items: center; white-space: nowrap; flex: 1; min-width: 0; overflow: hidden;">
                            <span>> TARGET: [ </span>
                            <div class="sys-env-scroll-area" style="flex: 1; display: flex; overflow-x: auto; gap: 15px; padding: 0 5px; scrollbar-width: none; -ms-overflow-style: none;">
                                <span class="sys-env-opt r-cell" onclick="selectSysEnv('THEME')" style="width:auto; cursor: pointer; font-weight: bold; color: var(--text-color); min-width: max-content; transition: all 0.3s; padding: 0;">${THEME}</span>
                                <span class="sys-env-opt r-cell" onclick="selectSysEnv('SUB_PID')" style="width:auto; cursor: pointer; color: var(--sub-text-color); min-width: max-content; transition: all 0.3s; padding: 0;">${SUB_PID}</span>
                                <span class="sys-env-opt r-cell" onclick="selectSysEnv('PIPE')" style="width:auto; cursor: pointer; color: var(--sub-text-color); min-width: max-content; transition: all 0.3s; padding: 0;">${PIPE}</span>
                            </div>
                            <span> ]</span>
                        </div>
                        <button class="t-btn desktop-submit-btn sys-desktop-btn" onclick="submitSysConfig()" style="flex-shrink: 0; margin-left: auto;">[ SET ]</button>
                    </div>
                    
                    <div class="comment-input-area terminal-input-wrapper sys-always-show" style="max-height: none !important; transition: all 0.3s ease; position: relative; z-index: 99999;">
                        <div class="input-container" id="sys-input-container-inner" style="flex:1; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);">
                            <!-- auto filled by JS -->
                        </div>
                        <button class="t-btn sys-mobile-btn" onclick="submitSysConfig()">[ SET ]</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 移动端侦测识别 (User-Agent)
        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobileDevice) {
            document.body.classList.add('mobile-mode');
        }

        // 主题管理
        function initTheme() {
            const savedTheme = localStorage.getItem('tonhie_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        initTheme();

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('tonhie_theme', target);
            const valEl = document.getElementById('theme-val');
            if (valEl) valEl.textContent = target;
        }

        const API_URL = window.location.origin;
        let globalPostsPromise = fetch(`${API_URL}/posts`).then(r => r.json()).catch(() => ({ data: [] }));
        let activePreloadPromise = null;
        let globalPosts = [];
        let typingInterval = null;
        let currentPostId = null;
        let currentRating = 5;

        /* =================加载打字机效果================= */
        function playLoadingAnim(elementId, textOptions, loop=false) {
            const el = document.getElementById(elementId);
            let idx = 0;
            let currentStr = "";
            let targetStr = textOptions[0];
            
            clearInterval(typingInterval);
            typingInterval = setInterval(() => {
                if(currentStr.length < targetStr.length) {
                    currentStr = targetStr.substring(0, currentStr.length + 1);
                    el.textContent = currentStr;
                } else if(loop) {
                    currentStr = "";
                } else {
                    clearInterval(typingInterval);
                }
            }, 50);
        }

        /* =================副标题打字机================= */
        const subtitles = ['echo "${TRACE_LOG}"', 'echo "${RUNTIME_STDOUT}"', 'echo "${PULSE_SIGNAL}"', 'echo "${MEMORY_DUMP}"'];
        let subIndex = 0; let charIndex = 0; let isDeleting = false;
        const subElement = document.getElementById('subtitle-text');

        function typeWriter() {
            const currentText = subtitles[subIndex];
            subElement.textContent = currentText.substring(0, isDeleting ? charIndex - 1 : charIndex + 1);
            charIndex = isDeleting ? charIndex - 1 : charIndex + 1;
            let typeSpeed = isDeleting ? 30 : 70;
            if (!isDeleting && charIndex === currentText.length) { typeSpeed = 3000; isDeleting = true; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; subIndex = (subIndex + 1) % subtitles.length; typeSpeed = 500; }
            setTimeout(typeWriter, typeSpeed);
        }
        typeWriter();

        let visitorIP = 'guest';

        function renderIPHTML(ip, isComment = false) {
            if (!ip) return '<span class="ip-box">UNKNOWN</span>';
            if (isMobileDevice && isComment) {
                // Mobile comment IP: gets 5 chars + ... + rest
                if (ip.length > 5) {
                    const start = ip.substring(0, 5);
                    const end = ip.substring(5);
                    return `<span class="ip-box tr" onclick="this.classList.toggle('expanded')"><span class="ip-part">${start}</span><span class="ip-part dots">..</span><span class="ip-part hidden-mid">${end}</span></span>`;
                }
            } else {
                // IPV6 Terminal Style Truncation
                if (ip.length > 15 && ip.includes(':')) {
                    const parts = ip.split(':').filter(Boolean);
                    if (parts.length >= 2) {
                        const head = parts[0] + ':';
                        const tail = ':' + parts[parts.length - 1];
                        const mid = parts.slice(1, parts.length - 1).join(':');
                        return `<span class="ip-box tr" onclick="this.classList.toggle('expanded')"><span class="ip-part">${head}</span><span class="ip-part dots">..</span><span class="ip-part hidden-mid">${mid}</span><span class="ip-part">${tail}</span></span>`;
                    }
                    const start = ip.substring(0, 15);
                    const end = ip.substring(15);
                    return `<span class="ip-box tr" onclick="this.classList.toggle('expanded')"><span class="ip-part">${start}</span><span class="ip-part dots">..</span><span class="ip-part hidden-mid">${end}</span></span>`;
                }
            }
            return `<span class="ip-box">${ip}</span>`;
        }

        function formatDisplayDate(dateStr) {
            if (!dateStr) return '';
            let t = dateStr.replace('T', ' ').substring(0, 19);
            if (isMobileDevice) {
                const localD = new Date(t.replace(' ', 'T'));
                if (!isNaN(localD)) {
                    const now = new Date();
                    const isToday = now.getFullYear() === localD.getFullYear() &&
                                    now.getMonth() === localD.getMonth() &&
                                    now.getDate() === localD.getDate();
                    const isThisYear = now.getFullYear() === localD.getFullYear();
                    
                    if (isToday) {
                        return String(localD.getHours()).padStart(2, '0') + ':' + String(localD.getMinutes()).padStart(2, '0');
                    } else if (isThisYear) {
                        const m = String(localD.getMonth() + 1).padStart(2, '0');
                        const day = String(localD.getDate()).padStart(2, '0');
                        return `${m}-${day}`;
                    } else {
                        const m = String(localD.getMonth() + 1).padStart(2, '0');
                        return `${localD.getFullYear()}-${m}`;
                    }
                }
            }
            return t;
        }

        async function initVisitorIP() {
            try {
                // Short timeout to not block UI if API is slow
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const res = await fetch(`${API_URL}/api/ip`, { signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await res.json();
                if (data.ip) {
                    visitorIP = data.ip;
                }
            } catch (e) {
                console.warn('IP fetch failed, using guest');
            }
            document.getElementById('main-bash-prefix').innerHTML = `${renderIPHTML(visitorIP)}@sys:~$`;
        }

        /* =================API数据渲染================= */
        async function fetchPosts() {
            // Wait for IP to be fetched before starting the animation
            await initVisitorIP();
            
            const cmdText = document.getElementById('journal-cmd');
            cmdText.textContent = 'journalctl -u tonhie.log -r';
            // measure width
            cmdText.style.width = 'auto';
            const targetWidth = cmdText.scrollWidth + 'px';
            cmdText.style.width = '0px';
            void cmdText.offsetWidth; // trigger reflow
            cmdText.style.width = targetWidth;

            const animWaitTime = 1000;
            const startTime = Date.now();
            try {
                let result;
                if (globalPostsPromise) {
                    result = await globalPostsPromise;
                    globalPostsPromise = null;
                } else {
                    const response = await fetch(`${API_URL}/posts`);
                    result = await response.json();
                }
                
                const elapsed = Date.now() - startTime;
                const remainingWait = Math.max(0, animWaitTime - elapsed);
                
                // wait for cmd typing transition to finish before showing posts, but don't wait extra if already finished
                setTimeout(() => {
                    document.getElementById('cmd-line-wrapper').classList.add('executed');
                    
                    setTimeout(() => {
                        const container = document.getElementById('post-container');
                        container.innerHTML = ''; 
                        globalPosts = result.data.reverse();
                        
                        globalPosts.forEach((post, index) => {
                            const level = post.level || 'INFO';
                            const timeStr = post.created_at || new Date().toISOString();
                            const displayTime = formatDisplayDate(timeStr);
                            
                            container.innerHTML += `
                                <div class="post-card" onclick="openModal(${index})" style="animation-delay: ${index * 0.1}s">
                                    <div class="post-header">
                                        <span class="post-level level-${level}">[${level}]</span>
                                        <h2>${post.title}</h2>
                                    </div>
                                    <div class="post-meta">#${post.ID || post.id} | TIMESTAMP: ${displayTime}</div>
                                    <p class="truncate-text">${post.content}</p>
                                </div>
                            `;
                        });
                    }, 400); // Posts appear as the command moves up
                }, remainingWait);
            } catch (error) {
                const elapsed = Date.now() - startTime;
                const remainingWait = Math.max(0, 1000 - elapsed);
                setTimeout(() => {
                    document.getElementById('cmd-line-wrapper').classList.add('executed');
                    setTimeout(() => {
                        document.getElementById('post-container').innerHTML = '<div><span class="loading-text" style="color:var(--color-error)">> _FATAL: CONNECTION TIMEOUT</span></div>';
                    }, 400);
                }, 1000);
            } finally {
                clearInterval(typingInterval);
            }
        }

        /* =================内容渲染================= */
        // Configure marked to handle Katex and Math!
        if (window.marked && window.markedKatex) {
            marked.use(markedKatex({ throwOnError: false }));
            marked.setOptions({
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        return hljs.highlight(code, { language: lang }).value;
                    }
                    return hljs.highlightAuto(code).value;
                }
            });
        }

        function renderPostContent(targetElement, contentText) {
            targetElement.innerHTML = '';
            
            const compiledNode = document.createElement('div');
            compiledNode.className = 'markdown-body';
            compiledNode.style.animation = 'slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            
            if (window.marked) {
                compiledNode.innerHTML = marked.parse(contentText);
            } else {
                compiledNode.innerHTML = contentText;
            }
            
            targetElement.appendChild(compiledNode);
        }

        function openModal(index) {
            const post = globalPosts[index];
            currentPostId = post.ID || post.id;
            const level = post.level || 'INFO';
            const timeStr = post.created_at || '';
            const displayTime = formatDisplayDate(timeStr);
            
            document.getElementById('modal-level').className = `post-level level-${level}`;
            document.getElementById('modal-level').textContent = `[${level}]`;
            document.getElementById('modal-title').textContent = post.title;
            
            // Sub-log style referencing journalctl _PID=1
            const pid = currentPostId || 1;
            document.getElementById('modal-meta').innerHTML = `<span class="bash-prefix">${renderIPHTML(visitorIP)}@sys:~$</span> journalctl _PID=${pid} --since="${displayTime}"`;
            
            const overlay = document.getElementById('read-modal');
            overlay.classList.remove('injected');
            document.getElementById('inject-btn').textContent = '[ FORK ]';
            document.getElementById('inject-btn').style.display = 'block';
            
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            renderPostContent(document.getElementById('modal-body'), post.content);
        }

        let sysInfoTypeInterval = null;
        let customSelectOpen = false;

        function toggleCustomOption(e) {
            if(e) e.stopPropagation();
            customSelectOpen = !customSelectOpen;
            const opts = document.getElementById('custom-sel-opts');
            const selectContainer = document.getElementById('sys-custom-select');
            if (opts) {
                if (customSelectOpen) {
                    opts.classList.add('open');
                    if(selectContainer) selectContainer.style.background = 'var(--code-bg)';
                } else {
                    opts.classList.remove('open');
                    if(selectContainer) selectContainer.style.background = 'var(--bg-color)';
                }
            }
        }

        function selectCustomVal(val, e) {
            if(e) e.stopPropagation();
            document.getElementById('sys-comment-input').value = val;
            document.getElementById('custom-sel-display').innerText = val;
            toggleCustomOption();
        }

        document.addEventListener('click', (e) => {
            if(customSelectOpen && !e.target.closest('.custom-select-options') && !e.target.closest('#sys-custom-select')) {
                customSelectOpen = false;
                const opts = document.getElementById('custom-sel-opts');
                const selectContainer = document.getElementById('sys-custom-select');
                if(opts) opts.classList.remove('open');
                if(selectContainer) selectContainer.style.background = 'var(--bg-color)';
            }
        });

        /* 网站说明 */
        let currentSysEnv = 'THEME';

        function openSiteInfo() {
            currentPostId = 'sys';
            document.getElementById('modal-level').className = `post-level level-INFO`;
            document.getElementById('modal-level').textContent = `[SYS]`;
            document.getElementById('modal-title').textContent = "Tonhie.log System Info";
            document.getElementById('modal-meta').innerHTML = `<span class="bash-prefix">${renderIPHTML(visitorIP)}@sys:~$</span> env`;
            
            const overlay = document.getElementById('read-modal');
            overlay.classList.remove('injected');
            const injectBtn = document.getElementById('inject-btn');
            injectBtn.textContent = '[ CONFIG ]';
            injectBtn.style.display = 'block'; 
            
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            const postContent = `# Tonhie.log\n- Terminal style minimal blog system.\n- 移除所有冗余设计\n- 黑白纯净体验\n- 状态码监控驱动\n\n> RUNNING NORMALLY.`;
            renderPostContent(document.getElementById('modal-body'), postContent);
            
            currentSysEnv = 'THEME'; // 重置为默认第一个
        }

        function selectSysEnv(envName) {
            currentSysEnv = envName;
            document.querySelectorAll('.sys-env-opt').forEach(el => {
                const isMatch = el.innerText.includes(envName);
                if (isMatch) {
                    el.style.color = 'var(--text-color)';
                    el.style.fontWeight = 'bold';
                    el.style.transform = 'scale(1.1)';
                    el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    el.style.color = 'var(--sub-text-color)';
                    el.style.fontWeight = 'normal';
                    el.style.transform = 'scale(1)';
                }
            });

            const inner = document.getElementById('sys-input-container-inner');
            
            inner.style.opacity = 0;
            inner.style.transform = 'translateY(10px)';
            customSelectOpen = false;
            
            if (envName === 'THEME') {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                const curVal = isDark ? 'dark' : 'light';
                inner.innerHTML = `
                    <div style="position: relative; width: 100%; height: 44px; z-index: 99999; background: var(--bg-color);">
                        <div id="sys-custom-select" style="position: relative; z-index: 60; width: 100%; height: 44px; border: 1px solid var(--line-color); background: var(--bg-color); padding: 0 10px; box-sizing: border-box; font-family: var(--font-mono); font-size: 14px; outline: none; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s;" onclick="toggleCustomOption(event)">
                            <span id="custom-sel-display" style="pointer-events: none;">${curVal}</span>
                            <span style="font-size: 10px; pointer-events: none;">▲</span>
                        </div>
                        <div id="custom-sel-opts" class="custom-select-options">
                            <div class="custom-select-opt" onclick="selectCustomVal('light', event)">> light</div>
                            <div class="custom-select-opt" onclick="selectCustomVal('dark', event)">> dark</div>
                        </div>
                        <input type="hidden" id="sys-comment-input" value="${curVal}">
                    </div>
                `;
            } else {
                const placeholder = envName === 'SUB_PID' ? '> [ USERNAME ]' : '> [ CONTACT ]';
                let defaultVal = '';
                if (envName === 'SUB_PID') defaultVal = localStorage.getItem('tonhie_codename') || '';
                if (envName === 'PIPE') defaultVal = localStorage.getItem('tonhie_contact') || '';
                
                inner.innerHTML = `
                    <input type="text" id="sys-comment-input" style="width: 100%; height: 44px; border: 1px solid var(--line-color); background: var(--bg-color); padding: 0 10px; box-sizing: border-box; font-family: var(--font-mono); font-size: 14px; outline: none; color: var(--text-color); transition: all 0.2s;" placeholder="${placeholder}" value="${defaultVal}">
                `;
                
                const el = document.getElementById('sys-comment-input');
                if (el) {
                    // 绑定防页面上滑逻辑 (参考了评论区实现)
                    el.addEventListener('touchstart', (e) => {
                        if (document.activeElement !== el) {
                            e.preventDefault();
                            el.focus({ preventScroll: true });
                        }
                    }, { passive: false });
                    
                    if (window.visualViewport) {
                        const handleResize = () => {
                            const overlay = document.getElementById('read-modal');
                            if (overlay && overlay.classList.contains('active') && document.body.classList.contains('mobile-mode')) {
                                overlay.style.height = window.visualViewport.height + 'px';
                                overlay.style.top = Math.max(0, window.visualViewport.offsetTop) + 'px';
                                window.scrollTo(0, 0);
                            } else if (overlay) {
                                overlay.style.height = '';
                                overlay.style.top = '0';
                            }
                        };
                        el.addEventListener('focus', () => setTimeout(handleResize, 100));
                        el.addEventListener('blur', () => requestAnimationFrame(handleResize));
                    }
                }
            }
            
            requestAnimationFrame(() => {
                inner.style.opacity = 1;
                inner.style.transform = 'translateY(0)';
            });
        }

        async function submitSysConfig() {
            let val = '';
            const inputEl = document.getElementById('sys-comment-input');
            if(inputEl) val = inputEl.value.trim();
            if(!val) return;

            if (currentSysEnv === 'THEME') {
                if(val === 'dark' || val === 'light') {
                    document.documentElement.setAttribute('data-theme', val);
                    localStorage.setItem('tonhie_theme', val);
                    const valEl = document.getElementById('theme-val');
                    if (valEl) valEl.textContent = val;
                }
            } else if (currentSysEnv === 'SUB_PID') {
                localStorage.setItem('tonhie_codename', val);
                const cnEl = document.getElementById('sub-codename');
                if (cnEl) cnEl.value = val;
            } else if (currentSysEnv === 'PIPE') {
                localStorage.setItem('tonhie_contact', val);
                const ctEl = document.getElementById('sub-contact');
                if (ctEl) ctEl.value = val;
            }
            
            try {
                const res = await fetch(`${API_URL}/sys_logs`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ env_key: currentSysEnv, env_val: val })
                });
                if(res.ok) {
                    await loadComments();
                }
            } catch(e) {
                console.warn('sys log inject fail');
            }
        }

        function closeModal() {
            document.getElementById('read-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
            if (typeof fastTypeInterval !== 'undefined') clearInterval(fastTypeInterval);
            clearInterval(sysInfoTypeInterval);
            currentPostId = null;
            document.getElementById('comment-list').innerHTML = ''; // Clear loaded comments on close
            
            // Allow the overlay transition to finish before fully clearing to prevent visual glitches
        }

        /* =================评论注入面板与API================= */
        async function toggleInject() {
            const overlay = document.getElementById('read-modal');
            overlay.classList.add('injected');
            document.getElementById('inject-btn').style.display = 'none';
            await loadComments();
        }

        async function loadComments() {
            if(!currentPostId) return;
            const requestPostId = currentPostId;
            const list = document.getElementById('comment-list');
            
            if (currentPostId === 'sys') {
                document.getElementById('comments-header').innerText = '> SYS_CONFIG / Environment Logs';
                document.getElementById('comment-input-section').style.display = 'none';
                document.getElementById('sys-input-section').style.display = 'flex';
                // Trigger selectSysEnv manually without transition? No, just ensuring it's shown:
                selectSysEnv(currentSysEnv);
                
                list.innerHTML = '<div style="opacity: 0.6; font-family: var(--font-mono);">> Fetching local environment logs...</div>';
                
                try {
                    let result;
                    if (activePreloadPromise) {
                        result = await activePreloadPromise;
                        activePreloadPromise = null;
                    } else {
                        const response = await fetch(`${API_URL}/sys_logs`);
                        result = await response.json();
                    }
                    if (requestPostId !== currentPostId) return;
                    let logsHTML = '';
                    const myLogs = result.data || [];
                    
                    if (myLogs.length === 0) {
                        logsHTML = '<div style="opacity:0; animation: slideUpFade 0.4s forwards;">> No records found.</div>';
                    } else {
                        // Reverse so newest is at the bottom (like terminal logs)
                        [...myLogs].reverse().forEach((l, i) => {
                            const ipHtml = renderIPHTML(l.ip_address || visitorIP, true);
                            logsHTML += `
                                <div class="comment-item" style="animation-delay: ${i * 0.1}s;">
                                    <div class="comment-meta">
                                        [IP: <span style="color:var(--color-error)">${ipHtml}</span>] SET ${l.env_key}
                                        <span style="float:right;">${formatDisplayDate(l.created_at)}</span>
                                    </div>
                                    <div style="white-space: pre-wrap;">$ export ${l.env_key}="${l.env_val.replace(/</g, '&lt;').replace(/>/g, '&gt;')}"</div>
                                </div>
                            `;
                        });
                    }
                    list.innerHTML = logsHTML;
                } catch(e) {
                    list.innerHTML = '<div style="color:var(--color-error); opacity:0; animation: slideUpFade 0.4s forwards;">> ERROR: FETCH FAILED_</div>';
                }
                return;
            }

            document.getElementById('comments-header').innerText = '> SYSLOG / Subprocess Injections';
            document.getElementById('comment-input-section').style.display = 'block';
            document.getElementById('sys-input-section').style.display = 'none';
            
            // Cmd typing style loader
            list.innerHTML = `
                <div class="journal-cmd-line loading-cmd" style="margin-bottom: 10px;">
                    <span class="bash-prefix">${renderIPHTML(visitorIP)}@sys:~$</span>
                    <span class="journal-cmd-text" id="comments-cmd-text" style="width:0; overflow:hidden; display:inline-block; vertical-align:bottom; white-space:nowrap; transition:width 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);"></span>
                </div>
                <div id="comments-output-container"></div>
            `;
            
            // Start typing animation immediately
            setTimeout(() => {
                const cmdEl = document.getElementById('comments-cmd-text');
                if(cmdEl) {
                    cmdEl.textContent = 'journalctl -u sub_process -r';
                    cmdEl.style.width = 'auto';
                    const targetW = cmdEl.offsetWidth + 'px';
                    cmdEl.style.width = '0px';
                    void cmdEl.offsetWidth;
                    cmdEl.style.width = targetW;
                }
            }, 50);

            const animWaitTime = 600;
            const startTime = Date.now();
            try {
                let result;
                if (activePreloadPromise) {
                    result = await activePreloadPromise;
                    activePreloadPromise = null;
                } else {
                    const response = await fetch(`${API_URL}/posts/${currentPostId}/comments`);
                    result = await response.json();
                }
                
                const elapsed = Date.now() - startTime;
                const remainingWait = Math.max(0, animWaitTime - elapsed);

                // Wait for typing animation to finish before showing comments
                setTimeout(() => {
                    if (requestPostId !== currentPostId) return;
                    const loadingCmd = document.querySelector('.loading-cmd');
                    if (loadingCmd) {
                        loadingCmd.style.transition = 'all 0.4s ease';
                        loadingCmd.style.opacity = '0';
                        loadingCmd.style.maxHeight = '0';
                        loadingCmd.style.margin = '0';
                    }

                    const outContainer = document.getElementById('comments-output-container');
                    if (!outContainer) return;
                    
                    if(result.data.length === 0) {
                        outContainer.innerHTML = '<div style="opacity:0; animation: slideUpFade 0.4s forwards;">> No injections detected.</div>';
                    } else {
                        const myComments = [];
                        const otherComments = [];
                        
                        result.data.forEach(c => {
                            if (c.ip_address === visitorIP && visitorIP !== 'guest') {
                                myComments.push(c);
                            } else {
                                otherComments.push(c);
                            }
                        });
                        
                        // Sort user's own comments from newest to oldest
                        myComments.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
                        // Sort other comments from newest to oldest (below user's)
                        otherComments.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
                        
                        const sortedComments = [...myComments, ...otherComments];
                        
                        let html = '';
                        sortedComments.forEach((c, i) => {
                            const isMe = (c.ip_address === visitorIP && visitorIP !== 'guest');
                            const ipHtml = renderIPHTML(c.ip_address, true);
                            const displayIp = isMe ? `<span style="color:var(--color-error)">${ipHtml}</span>` : ipHtml;
                            
                            html += `
                                <div class="comment-item" style="animation-delay: ${i * 0.15}s;">
                                    <div class="comment-meta">
                                        [IP: ${displayIp}] RATING: ${c.rating}/5
                                        <span style="float:right;">${formatDisplayDate(c.created_at)}</span>
                                    </div>
                                    <div style="white-space: pre-wrap;">$ ${c.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                                </div>
                            `;
                        });
                        outContainer.innerHTML = html;
                    }
                }, remainingWait);

            } catch (err) {
                const elapsed = Date.now() - startTime;
                const remainingWait = Math.max(0, animWaitTime - elapsed);
                setTimeout(() => {
                    if (requestPostId !== currentPostId) return;
                    const outContainer = document.getElementById('comments-output-container');
                    if(outContainer) outContainer.innerHTML = '<div style="color:var(--color-error); opacity:0; animation: slideUpFade 0.4s forwards;">> ERROR: FETCH FAILED_</div>';
                }, remainingWait);
            }
        }

        /* =================打分光标================= */
        function setRating(val) {
            currentRating = val;
            const cells = document.querySelectorAll('#rate-stars .r-cell');
            cells.forEach((cell, idx) => {
                cell.textContent = idx < val ? '■' : '□'; 
            });
            document.getElementById('rate-text').textContent = val;
        }
        setRating(5); // init default

        /* =================模拟光标输入层================= */
        function updateCursorOverlay() {
            const input = document.getElementById('comment-input');
            const overlay = document.getElementById('input-overlay');
            const text = input.value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            overlay.innerHTML = text + '<span class="cursor-block"></span>';
            
            // Auto resize logically
            const modalComments = document.querySelector('.modal-comments');
            if (modalComments && modalComments.classList.contains('input-expanded')) {
                const currentHeight = input.offsetHeight || 44;
                
                // temporarily disable transition to measure correctly
                input.style.transition = 'none';
                overlay.style.transition = 'none';
                
                // 暂时重置以便测出无约束时的真实高度
                input.style.height = '44px';
                overlay.style.height = '44px';
                
                // 通过 overlay 的 scrollHeight 来获取包裹内容(含光标换行)后的真实高度
                let targetHeight = overlay.scrollHeight;
                
                // Set the exact height to prevent jump from 44px (default) to scrollHeight
                if (targetHeight < 44 || input.value.length === 0) {
                    targetHeight = 44; 
                }
                
                const docHeight = document.body.clientHeight;
                const maxHeight = docHeight * 0.618;
                
                let finalHeight = targetHeight;
                if (finalHeight > maxHeight) finalHeight = maxHeight;
                
                if (finalHeight !== currentHeight) {
                    // 若发生高度变化，需使得起点是原本的高度从而平滑扩张/收缩
                    input.style.height = currentHeight + 'px';
                    overlay.style.height = currentHeight + 'px';
                    void input.offsetHeight; // 强制重绘，提交原高度状态
                    
                    // 恢复过渡动画
                    input.style.transition = '';
                    overlay.style.transition = '';
                    
                    // 设置为新的真实高度，触发过渡
                    input.style.height = finalHeight + 'px';
                    overlay.style.height = finalHeight + 'px';
                } else {
                    // 若无高度变化，直接无感应用
                    input.style.height = finalHeight + 'px';
                    overlay.style.height = finalHeight + 'px';
                    void input.offsetHeight;
                    
                    input.style.transition = '';
                    overlay.style.transition = '';
                }
            } else {
                input.style.height = '44px';
                overlay.style.height = '44px';
            }
            
            // Auto scroll overlay if needed
            overlay.scrollTop = input.scrollTop;
        }
        // Handle scroll sync just in case
        document.getElementById('comment-input').addEventListener('scroll', function() {
            document.getElementById('input-overlay').scrollTop = this.scrollTop;
        });
        updateCursorOverlay(); // init empty

        async function submitComment() {
            if(!currentPostId) return;
            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if(!content) return;
            
            try {
                const res = await fetch(`${API_URL}/posts/${currentPostId}/comments`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ content, rating: currentRating })
                });
                if(res.ok) {
                    input.value = '';
                    updateCursorOverlay();
                    setRating(5); // reset rating
                    await loadComments(); // reload dynamically
                }
            } catch(e) {
                alert('INJECTION FAILED');
            }
        }
        // 初始化
        fetchPosts();

        // 绑定输入框折叠逻辑（桌面与移动端通用）
        document.addEventListener('DOMContentLoaded', () => {
            const scrollArea = document.querySelector('.sys-env-scroll-area');
            if (scrollArea) {
                let bounceTimeout;
                scrollArea.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 50 : -50;
                    scrollArea.scrollBy({ left: delta, behavior: 'smooth' });
                    
                    // 单次弹跳效果
                    clearTimeout(bounceTimeout);
                    bounceTimeout = setTimeout(() => {
                        const isAtLeft = scrollArea.scrollLeft === 0;
                        const isAtRight = Math.ceil(scrollArea.scrollLeft + scrollArea.clientWidth) >= scrollArea.scrollWidth;
                        
                        if (isAtLeft && delta < 0) {
                            scrollArea.style.transform = 'translateX(15px)';
                            setTimeout(() => { scrollArea.style.transform = 'translateX(0)'; }, 300);
                        } else if (isAtRight && delta > 0) {
                            scrollArea.style.transform = 'translateX(-15px)';
                            setTimeout(() => { scrollArea.style.transform = 'translateX(0)'; }, 300);
                        }
                    }, 50); // 防抖检测结束
                });
            }
            
            const commentInput = document.getElementById('comment-input');
            const modalComments = document.querySelector('.modal-comments');
            
            if (commentInput && modalComments) {
                // 防止移动端浏览器默认的聚焦滚动动画导致整个页面上滑
                commentInput.addEventListener('touchstart', (e) => {
                    if (document.activeElement !== commentInput) {
                        e.preventDefault();
                        commentInput.focus({ preventScroll: true });
                    }
                }, { passive: false });

                // 打开键盘或聚焦时展开
                commentInput.addEventListener('focus', () => {
                    modalComments.classList.add('input-expanded');
                    updateCursorOverlay(); // 激发重算高度
                });

                // 点击模态框非评论框区域时收起，且需阻止传播避免本身收起文章
                document.querySelector('.modal-content').addEventListener('click', () => {
                    modalComments.classList.remove('input-expanded');
                    updateCursorOverlay(); // 激发恢复折叠高度
                });

                // 解决手机端键盘弹出时整体页面被顶起、遮挡或滚动的问题
                if (window.visualViewport) {
                    const handleResize = () => {
                        const overlay = document.getElementById('read-modal');
                        if (overlay && overlay.classList.contains('active') && document.body.classList.contains('mobile-mode')) {
                            // 让整个阅读底层覆盖满真实的视口高度，并跟随视口由于系统键盘产生的偏移
                            overlay.style.height = window.visualViewport.height + 'px';
                            overlay.style.top = Math.max(0, window.visualViewport.offsetTop) + 'px';
                            window.scrollTo(0, 0); // 抵消任何由浏览器默认行为造成的 Body 上移
                        } else if (overlay) {
                            overlay.style.height = '';
                            overlay.style.top = '0';
                        }
                    };
                    window.visualViewport.addEventListener('resize', handleResize);
                    window.visualViewport.addEventListener('scroll', handleResize);
                    commentInput.addEventListener('focus', () => setTimeout(handleResize, 100)); // 键盘彻底弹起时触发
                    commentInput.addEventListener('blur', () => requestAnimationFrame(handleResize));  // 键盘收起时立刻还原
                }
            }
        });
    </script>
